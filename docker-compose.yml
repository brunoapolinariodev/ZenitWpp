services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=zenitwpp;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Secret=CHANGE_ME_IN_PRODUCTION_MIN_32_CHARS!!
      - Jwt__Issuer=ZenitWpp
      - Jwt__Audience=ZenitWpp
      - AiService__BaseUrl=http://ai-service:8000
      - AiService__ApiKey=${AI_SERVICE_API_KEY:-changeme}
      - Storage__Provider=${STORAGE_PROVIDER:-local}
      - Storage__Local__BaseUrl=http://localhost:5000
      - Storage__S3__BucketName=${S3_BUCKET:-}
      - Storage__S3__ServiceUrl=${S3_SERVICE_URL:-}
      - Storage__S3__AccessKey=${S3_ACCESS_KEY:-}
      - Storage__S3__SecretKey=${S3_SECRET_KEY:-}
      - Storage__S3__PublicUrl=${S3_PUBLIC_URL:-}
    volumes:
      - uploads_data:/app/wwwroot/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-anthropic/claude-sonnet-4-5}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WHISPER_MODEL=whisper-1
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/gcp-vision.json
      - API_KEY=${AI_SERVICE_API_KEY}
    volumes:
      - ./credentials:/app/credentials:ro
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zenitwpp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  uploads_data:
